<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the blog. | thatswassupps.</title>
<meta name="description" content="streetwear styling, culture, and things we felt like writing about. the thatswassupps. blog.">
<link rel="canonical" href="https://thatswassupps.github.io/index/blog/">
<meta property="og:title" content="the blog. | thatswassupps.">
<meta property="og:description" content="streetwear styling, culture, and things we felt like writing about.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://thatswassupps.github.io/index/blog/">
<meta property="og:site_name" content="thatswassupps.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="the blog. | thatswassupps.">
<meta name="twitter:description" content="streetwear styling, culture, and things we felt like writing about.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#0a0a0a;--true-black:#000;--white:#f2f0ec;--pure-white:#fff;
  --cream:#e8e5df;--g100:#d4d1cb;--g200:#b0ada7;--g400:#7a7772;
  --g600:#4a4844;--g800:#1e1d1b;--g900:#141312;--spot:#d4b856;
  --font-logo:'Montserrat',sans-serif;--font-mono:'Space Mono',monospace;
  --font-display:'Montserrat',sans-serif;
  --ease-expo:cubic-bezier(.16,1,.3,1);
}
html{background:var(--black);color:var(--white);font-family:var(--font-mono);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{background:var(--black);overflow-x:hidden;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}

/* grain */
.grain{position:fixed;top:-50%;left:-50%;width:200%;height:200%;pointer-events:none;z-index:9998;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:grain .4s steps(1) infinite}
@keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-5%,-3%)}50%{transform:translate(3%,-7%)}75%{transform:translate(-7%,3%)}}

/* nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;pointer-events:none}
.nav>*{pointer-events:auto}
.nav-logo{font-family:var(--font-logo);font-weight:500;font-size:13px;letter-spacing:-.02em;text-transform:lowercase;mix-blend-mode:difference;color:var(--pure-white)}
.nav-logo .p{color:var(--spot)}
.nav-center{display:flex;gap:28px;list-style:none;mix-blend-mode:difference}
.nav-center a{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:lowercase;color:var(--pure-white);opacity:.5;transition:opacity .3s}
.nav-center a:hover,.nav-center a.active{opacity:1}
.nav-right{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:lowercase;padding:10px 20px;border:1px solid rgba(255,255,255,.1);color:var(--white);transition:all .3s var(--ease-expo);mix-blend-mode:difference}
.back-btn:hover{border-color:var(--spot);color:var(--spot)}
.back-btn svg{width:10px;height:10px;transform:rotate(180deg)}
@media(max-width:768px){.nav{padding:14px 20px}.nav-center{display:none}}

/* blog hero */
.blog-hero{padding:160px 48px 60px;max-width:1200px;margin:0 auto}
.blog-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--spot);display:flex;align-items:center;gap:10px;margin-bottom:20px}
.blog-label::before{content:'';width:24px;height:1px;background:var(--spot)}
.blog-title{font-family:var(--font-logo);font-weight:800;font-size:clamp(40px,7vw,90px);letter-spacing:-.04em;text-transform:lowercase;line-height:.9;color:var(--pure-white);margin-bottom:16px}
.blog-title .outline{-webkit-text-stroke:1.5px var(--pure-white);color:var(--black);paint-order:stroke fill}
.blog-sub{font-family:var(--font-mono);font-size:clamp(11px,1.2vw,13px);color:var(--g400);max-width:500px;line-height:1.6;font-style:italic}

/* filter pills */
.blog-filters{padding:0 48px 40px;max-width:1200px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
.filter-pill{font-family:var(--font-mono);font-size:8px;letter-spacing:.12em;text-transform:lowercase;padding:8px 16px;border:1px solid rgba(255,255,255,.08);color:var(--g400);transition:all .3s var(--ease-expo);cursor:pointer}
.filter-pill:hover,.filter-pill.active{border-color:var(--spot);color:var(--spot)}

/* blog grid */
.blog-grid{padding:0 48px 80px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}

/* article card */
.article-card{background:var(--g900);border:1px solid rgba(255,255,255,.03);overflow:hidden;transition:all .4s var(--ease-expo);display:flex;flex-direction:column}
.article-card:hover{border-color:rgba(212,184,86,.3);transform:translateY(-4px)}
.article-card-img{aspect-ratio:16/9;background:var(--g800);overflow:hidden}
.article-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease-expo)}
.article-card:hover .article-card-img img{transform:scale(1.03)}
.article-card-body{padding:24px;flex:1;display:flex;flex-direction:column}
.article-card-pillar{font-family:var(--font-mono);font-size:7px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--spot);margin-bottom:12px}
.article-card-title{font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-.01em;text-transform:lowercase;line-height:1.3;margin-bottom:10px;color:var(--pure-white);transition:color .3s}
.article-card:hover .article-card-title{color:var(--spot)}
.article-card-excerpt{font-family:var(--font-mono);font-size:11px;color:var(--g400);line-height:1.6;margin-bottom:16px;flex:1}
.article-card-meta{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid rgba(255,255,255,.04)}
.article-card-date{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;color:var(--g600)}
.article-card-read{font-family:var(--font-mono);font-size:8px;letter-spacing:.1em;color:var(--g600);display:flex;align-items:center;gap:6px;transition:color .3s}
.article-card:hover .article-card-read{color:var(--spot)}

/* empty state */
.blog-empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.blog-empty-text{font-family:var(--font-mono);font-size:13px;color:var(--g600);line-height:1.8}

/* footer */
.blog-footer{padding:40px 48px;border-top:1px solid rgba(255,255,255,.04);max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.blog-footer-logo{font-family:var(--font-logo);font-weight:500;font-size:11px;letter-spacing:-.02em;text-transform:lowercase;color:var(--g600)}
.blog-footer-logo .p{color:var(--spot)}
.blog-footer-link{font-family:var(--font-mono);font-size:8px;letter-spacing:.12em;color:var(--g600);transition:color .3s}
.blog-footer-link:hover{color:var(--spot)}

@media(max-width:768px){
  .blog-hero{padding:120px 20px 40px}
  .blog-filters{padding:0 20px 32px}
  .blog-grid{padding:0 20px 60px;grid-template-columns:1fr}
  .blog-footer{padding:40px 20px;flex-direction:column;gap:16px;text-align:center}
}
</style>
</head>
<body>

<div class="grain"></div>

<!-- nav -->
<nav class="nav">
  <a href="/index/" class="nav-logo">thatswassupps<span class="p">.</span></a>
  <div class="nav-center">
    <a href="/index/">home</a>
    <a href="/index/#stuff">stuff</a>
    <a href="/index/blog/" class="active">blog</a>
  </div>
  <div class="nav-right">
    <a href="/index/" class="back-btn">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6h8M6 2l4 4-4 4"/></svg>
      back to site
    </a>
  </div>
</nav>

<!-- hero -->
<section class="blog-hero">
  <div class="blog-label">the blog</div>
  <h1 class="blog-title">words<br>and <span class="outline">stuff.</span></h1>
  <p class="blog-sub">streetwear styling, culture, and things we felt like writing about. no fluff. no listicles about "10 ways to level up your wardrobe." just real ones.</p>
</section>

<!-- filters -->
<div class="blog-filters">
  <button class="filter-pill active" data-filter="all">all</button>
  <button class="filter-pill" data-filter="styling">styling</button>
  <button class="filter-pill" data-filter="culture">culture</button>
  <button class="filter-pill" data-filter="product">product</button>
</div>

<!-- grid -->
<div class="blog-grid" id="blogGrid">
  <!-- articles injected by JS from posts.json -->
</div>

<!-- footer -->
<footer class="blog-footer">
  <span class="blog-footer-logo">thatswassupps<span class="p">.</span></span>
  <a href="/index/" class="blog-footer-link">back to the site &rarr;</a>
</footer>

<script>
(function() {
  // load posts
  fetch('./posts.json')
    .then(function(r) { return r.json(); })
    .then(function(data) { renderPosts(data.posts || []); })
    .catch(function() { renderPosts([]); });

  function renderPosts(posts) {
    var grid = document.getElementById('blogGrid');
    if (!posts.length) {
      grid.innerHTML = '<div class="blog-empty"><p class="blog-empty-text">nothing here yet.<br>we\'re working on it. or not. we\'ll see.</p></div>';
      return;
    }

    // sort newest first
    posts.sort(function(a, b) { return new Date(b.published_at) - new Date(a.published_at); });

    grid.innerHTML = posts.map(function(post) {
      var dateStr = formatDate(post.published_at);
      var readTime = Math.max(1, Math.round((post.word_count || 800) / 250));
      var imgHtml = post.featured_image
        ? '<div class="article-card-img"><img src="' + post.featured_image + '" alt="' + post.title + '" loading="lazy"></div>'
        : '';
      return '<a href="./' + post.handle + '.html" class="article-card" data-pillar="' + post.pillar + '">'
        + imgHtml
        + '<div class="article-card-body">'
        + '<div class="article-card-pillar">' + post.pillar + '</div>'
        + '<h2 class="article-card-title">' + post.title + '</h2>'
        + '<p class="article-card-excerpt">' + post.excerpt + '</p>'
        + '<div class="article-card-meta">'
        + '<span class="article-card-date">' + dateStr + '</span>'
        + '<span class="article-card-read">' + readTime + ' min read <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6h8M6 2l4 4-4 4"/></svg></span>'
        + '</div></div></a>';
    }).join('');
  }

  function formatDate(d) {
    var months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    var date = new Date(d);
    return months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
  }

  // filter pills
  document.querySelectorAll('.filter-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      var filter = this.getAttribute('data-filter');
      document.querySelectorAll('.article-card').forEach(function(card) {
        if (filter === 'all' || card.getAttribute('data-pillar') === filter) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    });
  });
})();
</script>
</body>
</html>
